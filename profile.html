<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Profile - Commander 04</title>

    <link rel="stylesheet" href="profile.css">

</head>


<body>


<main class="profile-container">


    <div class="logo-box">
        C
    </div>


    <h1>
        Create your profile ID
    </h1>



    <div class="input-box">

        <label>
            Username:
        </label>


        <input 
        type="text"
        placeholder="Enter username">


    </div>




    <div class="avatar-box">

        <label>
            Choose your avatar:
        </label>


        <div class="avatar-list">


            <img src="assets/images/avatar1.png">

            <img src="assets/images/avatar2.png">

            <img src="assets/images/avatar3.png">


            <img src="assets/images/avatar4.png">

            <img src="assets/images/avatar5.png">

            <img src="assets/images/avatar6.png">


            <img src="assets/images/avatar7.png">

            <img src="assets/images/avatar8.png">

            <img src="assets/images/avatar9.png">


        </div>


    </div>




    <button class="create-button">

        Create Profile

    </button>



</main>


</body>

</html>
