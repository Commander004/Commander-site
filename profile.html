<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Profile - Commander 04</title>

    <link rel="stylesheet" href="profile.css">

</head>

<body>

<main class="profile-container">

    <div class="logo-box">
        C
    </div>

    <h1>
        Create your profile ID
    </h1>

    <div class="input-box">

        <label>
            Username:
        </label>

        <input
            id="username"
            type="text"
            placeholder="Enter username"
            maxlength="20">

    </div>

    <div class="avatar-box">

        <label>
            Choose your avatar:
        </label>

        <div class="avatar-list">

            <img src="assets/images/avatar1.png" class="avatar">
            <img src="assets/images/avatar2.png" class="avatar">
            <img src="assets/images/avatar3.png" class="avatar">

            <img src="assets/images/avatar4.png" class="avatar">
            <img src="assets/images/avatar5.png" class="avatar">
            <img src="assets/images/avatar6.png" class="avatar">

            <img src="assets/images/avatar7.png" class="avatar">
            <img src="assets/images/avatar8.png" class="avatar">
            <img src="assets/images/avatar9.png" class="avatar">

        </div>

    </div>

    <button
        id="createProfile"
        class="create-button">

        Create Profile

    </button>

</main>

<script src="profile.js"></script>

</body>

</html>
